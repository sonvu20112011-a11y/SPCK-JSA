<div class="container mt-5 text-center">
    <h2 class="mb-4">Dự Báo Thời Tiết</h2>

        <input type="text" id="cityInput" class="form-control" placeholder="Nhập tên thành phố...">
        <button class="btn btn-primary" id="searchBtn">Tìm kiếm</button>
        <button class="btn btn-secondary" id="geoBtn">📍 Định vị</button>
    </div>
    <div id="weatherResult" class="card p-4 d-none">
        <h3 id="cityName"></h3>
        <p id="temp" class="display-4"></p>
        <p id="desc"></p>
    </div>
</div>
